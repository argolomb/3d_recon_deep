<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Point Cloud</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101214;
      color: #e8ecef;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      max-width: 980px;
    }
    input, button {
      height: 34px;
      border: 1px solid #3d464d;
      background: #181c20;
      color: #e8ecef;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
    }
    input {
      flex: 1;
      min-width: 240px;
    }
    button {
      cursor: pointer;
    }
    #status {
      min-width: 190px;
      font-size: 13px;
      color: #aab4bc;
    }
    .view-button {
      min-width: 72px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="toolbar">
    <input id="url" value="ws://127.0.0.1:8765" spellcheck="false">
    <button id="connect">Connect</button>
    <button id="center" class="view-button">Center</button>
    <button id="yaw-left" class="view-button">Yaw -90</button>
    <button id="yaw-right" class="view-button">Yaw +90</button>
    <button id="pitch-up" class="view-button">Pitch +90</button>
    <button id="pitch-down" class="view-button">Pitch -90</button>
    <span id="status">disconnected</span>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js";

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101214);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 200);
    camera.position.set(0, -2.2, 1.4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 1.2);
    controls.enableDamping = true;

    const grid = new THREE.GridHelper(10, 20, 0x3a4248, 0x252b30);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    const material = new THREE.PointsMaterial({
      size: 0.015,
      vertexColors: true,
      sizeAttenuation: true
    });

    let cloud = null;
    let socket = null;
    let frames = 0;
    let autoCentered = false;
    let lastFpsAt = performance.now();
    const status = document.getElementById("status");
    const urlInput = document.getElementById("url");

    function cloudBounds() {
      if (!cloud || !cloud.geometry) {
        return null;
      }
      cloud.geometry.computeBoundingSphere();
      cloud.geometry.computeBoundingBox();
      const sphere = cloud.geometry.boundingSphere;
      const box = cloud.geometry.boundingBox;
      if (!sphere || !Number.isFinite(sphere.radius) || sphere.radius <= 0) {
        return null;
      }
      return { center: sphere.center.clone(), radius: sphere.radius, box };
    }

    function centerView() {
      const bounds = cloudBounds();
      if (!bounds) {
        return;
      }

      const direction = camera.position.clone().sub(controls.target);
      if (direction.lengthSq() < 1e-6) {
        direction.set(0, -1, 0.45);
      }
      direction.normalize();

      const fov = THREE.MathUtils.degToRad(camera.fov);
      const distance = Math.max(bounds.radius / Math.sin(fov * 0.5), 0.5) * 1.25;
      controls.target.copy(bounds.center);
      camera.position.copy(bounds.center).addScaledVector(direction, distance);
      camera.near = Math.max(distance / 1000, 0.001);
      camera.far = Math.max(distance + bounds.radius * 8, 20);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function rotateView(axis, angleRad) {
      const bounds = cloudBounds();
      if (bounds) {
        controls.target.copy(bounds.center);
      }
      const offset = camera.position.clone().sub(controls.target);
      const rotation = new THREE.Quaternion().setFromAxisAngle(axis.normalize(), angleRad);
      offset.applyQuaternion(rotation);
      camera.up.applyQuaternion(rotation).normalize();
      camera.position.copy(controls.target).add(offset);
      camera.lookAt(controls.target);
      controls.update();
    }

    function rotateYaw(angleRad) {
      rotateView(new THREE.Vector3(0, 0, 1), angleRad);
    }

    function rotatePitch(angleRad) {
      const right = new THREE.Vector3();
      camera.getWorldDirection(right);
      right.cross(camera.up).normalize();
      if (right.lengthSq() > 1e-6) {
        rotateView(right, angleRad);
      }
    }

    function setCloud(buffer) {
      const data = new Float32Array(buffer);
      const count = Math.floor(data.length / 6);
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0, p = 0, c = 0; i < count; i += 1) {
        const offset = i * 6;
        positions[p++] = data[offset + 0];
        positions[p++] = -data[offset + 1];
        positions[p++] = -data[offset + 2];
        colors[c++] = data[offset + 3];
        colors[c++] = data[offset + 4];
        colors[c++] = data[offset + 5];
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      geometry.computeBoundingSphere();

      if (cloud) {
        cloud.geometry.dispose();
        cloud.geometry = geometry;
      } else {
        cloud = new THREE.Points(geometry, material);
        scene.add(cloud);
      }

      if (!autoCentered) {
        centerView();
        autoCentered = true;
      }

      frames += 1;
      const now = performance.now();
      if (now - lastFpsAt > 1000) {
        status.textContent = `connected | ${count.toLocaleString()} pts | ${frames} fps`;
        frames = 0;
        lastFpsAt = now;
      }
    }

    function connect() {
      if (socket) {
        socket.close();
      }
      socket = new WebSocket(urlInput.value.trim());
      socket.binaryType = "arraybuffer";
      status.textContent = "connecting";
      socket.onopen = () => {
        status.textContent = "connected";
      };
      socket.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          setCloud(event.data);
        }
      };
      socket.onclose = () => {
        status.textContent = "disconnected";
      };
      socket.onerror = () => {
        status.textContent = "socket error";
      };
    }

    document.getElementById("connect").addEventListener("click", connect);
    document.getElementById("center").addEventListener("click", centerView);
    document.getElementById("yaw-left").addEventListener("click", () => rotateYaw(Math.PI / 2));
    document.getElementById("yaw-right").addEventListener("click", () => rotateYaw(-Math.PI / 2));
    document.getElementById("pitch-up").addEventListener("click", () => rotatePitch(Math.PI / 2));
    document.getElementById("pitch-down").addEventListener("click", () => rotatePitch(-Math.PI / 2));

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
